<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept C — Single Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg-base: #1a1714;
    --bg-surface: rgba(38, 34, 30, 0.72);
    --border-subtle: rgba(255, 235, 210, 0.06);

    --text-primary: rgba(255, 248, 240, 0.92);
    --text-secondary: rgba(255, 235, 210, 0.55);
    --text-muted: rgba(255, 235, 210, 0.3);

    --accent: #2dd4bf;
    --accent-dim: rgba(45, 212, 191, 0.1);

    --safe: #34d399;
    --warn: #fb923c;
    --danger: #f87171;

    --track: rgba(255, 235, 210, 0.06);

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-pill: 100px;

    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0c0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
  }

  .popover {
    width: 360px;
    height: 420px;
    background: var(--bg-surface);
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 0;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .popover::before {
    content: '';
    position: absolute;
    top: -40%;
    right: -20%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(251, 146, 60, 0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Sections flow with internal padding */
  .section {
    padding: 18px 22px;
  }

  .divider {
    height: 1px;
    background: var(--border-subtle);
    margin: 0 22px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .header-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--safe);
    background: rgba(52, 211, 153, 0.1);
    padding: 2px 7px;
    border-radius: var(--radius-pill);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .icon-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .icon-btn:hover {
    background: rgba(255, 235, 210, 0.06);
    color: var(--text-secondary);
  }

  /* Metric section */
  .metric {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .metric-label-col {
    min-width: 56px;
  }

  .metric-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .metric-timer {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-muted);
  }

  .metric-bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .bar-track {
    width: 100%;
    height: 6px;
    background: var(--track);
    border-radius: var(--radius-pill);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: var(--radius-pill);
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .bar-fill.safe { background: linear-gradient(90deg, var(--safe), var(--accent)); }
  .bar-fill.warn { background: linear-gradient(90deg, var(--accent), var(--warn)); }
  .bar-fill.danger { background: linear-gradient(90deg, var(--warn), var(--danger)); }

  .metric-pct {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 52px;
    text-align: right;
  }

  .metric-pct.warn { color: var(--warn); }
  .metric-pct.danger { color: var(--danger); }

  /* Models row */
  .models-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .model-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .model-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  .model-dot.opus { background: var(--accent); }
  .model-dot.sonnet { background: var(--warn); }
  .model-dot.haiku { background: var(--safe); }

  .model-name {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .model-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--track);
    border-radius: var(--radius-pill);
    overflow: hidden;
    min-width: 40px;
  }

  .model-bar {
    height: 100%;
    border-radius: var(--radius-pill);
  }

  .model-bar.opus { background: var(--accent); }
  .model-bar.sonnet { background: var(--warn); }
  .model-bar.haiku { background: var(--safe); }

  .model-pct {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    min-width: 28px;
    text-align: right;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
  }

  .footer-left {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .details-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: none;
    border: none;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
  }

  .details-btn:hover {
    background: var(--accent-dim);
  }

  .details-btn svg {
    width: 12px;
    height: 12px;
  }
</style>
</head>
<body>
  <div class="popover">
    <!-- Header bar -->
    <div class="header">
      <div class="header-left">
        <span class="header-title">Claude</span>
        <span class="header-badge">Live</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
            <path d="M16 16h5v5"/>
          </svg>
        </button>
        <button class="icon-btn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 5h metric -->
    <div class="section">
      <div class="metric">
        <div class="metric-label-col">
          <div class="metric-label">5h window</div>
          <div class="metric-timer">1h 42m left</div>
        </div>
        <div class="metric-bar-col">
          <div class="bar-track">
            <div class="bar-fill safe" style="width: 68%"></div>
          </div>
        </div>
        <div class="metric-pct">68%</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 7d metric -->
    <div class="section">
      <div class="metric">
        <div class="metric-label-col">
          <div class="metric-label">7d window</div>
          <div class="metric-timer">3d 14h left</div>
        </div>
        <div class="metric-bar-col">
          <div class="bar-track">
            <div class="bar-fill warn" style="width: 81%"></div>
          </div>
        </div>
        <div class="metric-pct warn">81%</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Model breakdown -->
    <div class="section models-section">
      <div class="model-item">
        <span class="model-dot opus"></span>
        <span class="model-name">Opus</span>
        <div class="model-bar-wrap">
          <div class="model-bar opus" style="width: 52%"></div>
        </div>
        <span class="model-pct">42%</span>
      </div>
      <div class="model-item">
        <span class="model-dot sonnet"></span>
        <span class="model-name">Sonnet</span>
        <div class="model-bar-wrap">
          <div class="model-bar sonnet" style="width: 38%"></div>
        </div>
        <span class="model-pct">31%</span>
      </div>
      <div class="model-item">
        <span class="model-dot haiku"></span>
        <span class="model-name">Haiku</span>
        <div class="model-bar-wrap">
          <div class="model-bar haiku" style="width: 10%"></div>
        </div>
        <span class="model-pct">8%</span>
      </div>
    </div>

    <div style="flex: 1"></div>

    <!-- Footer -->
    <div class="section footer">
      <span class="footer-left">Updated 2m ago</span>
      <button class="details-btn">
        See details
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </button>
    </div>
  </div>
</body>
</html>
