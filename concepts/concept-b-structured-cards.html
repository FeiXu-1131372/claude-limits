<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept B — Structured Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg-base: #1a1714;
    --bg-surface: rgba(38, 34, 30, 0.72);
    --bg-card: rgba(50, 44, 38, 0.45);
    --bg-card-hover: rgba(58, 52, 44, 0.55);
    --border-subtle: rgba(255, 235, 210, 0.06);
    --border-card: rgba(255, 235, 210, 0.08);
    --border-card-hover: rgba(255, 235, 210, 0.12);

    --text-primary: rgba(255, 248, 240, 0.92);
    --text-secondary: rgba(255, 235, 210, 0.55);
    --text-muted: rgba(255, 235, 210, 0.3);

    --accent: #2dd4bf;
    --accent-dim: rgba(45, 212, 191, 0.12);

    --safe: #34d399;
    --warn: #fb923c;
    --danger: #f87171;

    --track: rgba(255, 235, 210, 0.06);

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-card: 12px;
    --radius-pill: 100px;

    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0c0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
  }

  .popover {
    width: 360px;
    height: 420px;
    background: var(--bg-surface);
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .popover::before {
    content: '';
    position: absolute;
    top: -30%;
    right: -15%;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(251, 146, 60, 0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Header — compact */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-icon {
    width: 16px;
    height: 16px;
    opacity: 0.5;
  }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .header-status {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  /* Glass card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: var(--radius-card);
    padding: 14px 16px;
    transition: background 0.2s, border-color 0.2s;
  }

  .card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-card-hover);
  }

  /* Usage card — the two-bar layout */
  .card-usage {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .usage-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .usage-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .usage-label-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .usage-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .usage-reset {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .usage-pct {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .usage-pct.warn { color: var(--warn); }
  .usage-pct.danger { color: var(--danger); }

  .bar-track {
    width: 100%;
    height: 5px;
    background: var(--track);
    border-radius: var(--radius-pill);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: var(--radius-pill);
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .bar-fill.safe {
    background: linear-gradient(90deg, var(--safe), var(--accent));
  }
  .bar-fill.warn {
    background: linear-gradient(90deg, var(--accent), var(--warn));
  }
  .bar-fill.danger {
    background: linear-gradient(90deg, var(--warn), var(--danger));
  }

  /* Models card */
  .card-models {
    display: flex;
    gap: 8px;
  }

  .model-chip {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255, 235, 210, 0.03);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
  }

  .model-chip-left {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .model-indicator {
    width: 8px;
    height: 8px;
    border-radius: 3px;
  }

  .model-indicator.opus { background: var(--accent); opacity: 0.7; }
  .model-indicator.sonnet { background: var(--warn); opacity: 0.7; }
  .model-indicator.haiku { background: var(--safe); opacity: 0.7; }

  .model-name {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .model-pct {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-primary);
  }

  /* Footer card */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: transparent;
    border: none;
  }

  .footer-time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .footer-btn {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-dim);
    border: none;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  .footer-btn:hover {
    background: rgba(45, 212, 191, 0.2);
  }

  .footer-btn:active {
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="popover">
    <div class="header">
      <div class="header-left">
        <svg class="header-icon" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6" stroke="rgba(255,235,210,0.5)" stroke-width="1.5"/>
          <circle cx="8" cy="8" r="2.5" fill="rgba(255,235,210,0.4)"/>
        </svg>
        <span class="header-title">Claude</span>
      </div>
      <span class="header-status">2m ago</span>
    </div>

    <div class="card card-usage">
      <!-- 5h -->
      <div class="usage-row">
        <div class="usage-header">
          <div class="usage-label-group">
            <span class="usage-label">5h window</span>
            <span class="usage-reset">1h 42m left</span>
          </div>
          <span class="usage-pct">68%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill safe" style="width: 68%"></div>
        </div>
      </div>

      <!-- 7d -->
      <div class="usage-row">
        <div class="usage-header">
          <div class="usage-label-group">
            <span class="usage-label">7d window</span>
            <span class="usage-reset">3d 14h left</span>
          </div>
          <span class="usage-pct warn">81%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill warn" style="width: 81%"></div>
        </div>
      </div>
    </div>

    <div class="card card-models">
      <div class="model-chip">
        <div class="model-chip-left">
          <span class="model-indicator opus"></span>
          <span class="model-name">Opus</span>
        </div>
        <span class="model-pct">42%</span>
      </div>
      <div class="model-chip">
        <div class="model-chip-left">
          <span class="model-indicator sonnet"></span>
          <span class="model-name">Sonnet</span>
        </div>
        <span class="model-pct">31%</span>
      </div>
      <div class="model-chip">
        <div class="model-chip-left">
          <span class="model-indicator haiku"></span>
          <span class="model-name">Haiku</span>
        </div>
        <span class="model-pct">8%</span>
      </div>
    </div>

    <div class="card-footer">
      <span class="footer-time">Updated 2m ago</span>
      <button class="footer-btn">See details</button>
    </div>
  </div>
</body>
</html>
