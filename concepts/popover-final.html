<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompactPopover — Final Design</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg-base: #1a1714;
    --bg-surface: rgba(38, 34, 30, 0.72);
    --bg-card: rgba(50, 44, 38, 0.45);
    --bg-card-hover: rgba(58, 52, 44, 0.55);
    --border-subtle: rgba(255, 235, 210, 0.05);
    --border-card: rgba(255, 235, 210, 0.08);
    --border-hover: rgba(255, 235, 210, 0.12);

    --text-primary: rgba(255, 248, 240, 0.92);
    --text-secondary: rgba(255, 235, 210, 0.55);
    --text-muted: rgba(255, 235, 210, 0.3);

    --accent: #2dd4bf;
    --accent-dim: rgba(45, 212, 191, 0.12);

    --safe: #4ade80;
    --safe-dim: rgba(52, 211, 153, 0.12);
    --warn: #fb923c;
    --warn-dim: rgba(251, 146, 60, 0.12);
    --danger: #f87171;

    --track: rgba(255, 235, 210, 0.06);

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-card: 12px;
    --radius-pill: 100px;

    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0c0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
  }

  .popover {
    width: 360px;
    height: 420px;
    background: var(--bg-surface);
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .popover::before {
    content: '';
    position: absolute;
    top: -30%;
    right: -15%;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(251, 146, 60, 0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 8px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* Live badge with pulse dot */
  .badge-live {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px;
    border-radius: var(--radius-pill);
    font-size: 10px;
    font-weight: 500;
    background: var(--safe-dim);
    color: var(--safe);
  }

  .badge-live .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Icon buttons */
  .icon-btn {
    width: 30px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .icon-btn:hover {
    background: var(--bg-card);
    color: var(--text-secondary);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  /* Glass card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: var(--radius-card);
    padding: 12px 14px;
    transition: background 0.2s, border-color 0.2s;
  }

  /* Usage rows */
  .usage-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .usage-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .usage-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .usage-label-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .usage-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .usage-reset {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .usage-pct {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .usage-pct.warn { color: var(--warn); }
  .usage-pct.danger { color: var(--danger); }

  .bar-track {
    width: 100%;
    height: 5px;
    background: var(--track);
    border-radius: var(--radius-pill);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: var(--radius-pill);
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .bar-fill.safe { background: linear-gradient(90deg, var(--safe), var(--accent)); }
  .bar-fill.warn { background: linear-gradient(90deg, var(--accent), var(--warn)); }
  .bar-fill.danger { background: linear-gradient(90deg, var(--warn), var(--danger)); }

  /* Models — simplified dot + label + number */
  .models-row {
    display: flex;
    gap: 12px;
    padding: 0 2px;
  }

  .model-item {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .model-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .model-dot.opus { background: var(--accent); }
  .model-dot.sonnet { background: var(--warn); }
  .model-dot.haiku { background: var(--safe); }

  .model-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .model-pct {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
    margin-left: auto;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
    margin-top: auto;
  }

  .footer-time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .footer-btn {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-dim);
    border: none;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  .footer-btn:hover {
    background: rgba(45, 212, 191, 0.2);
  }

  .footer-btn:active {
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="popover">
    <!-- Header with Live badge and icon buttons -->
    <div class="header">
      <div class="header-left">
        <span class="header-title">Claude</span>
        <span class="badge-live"><span class="dot"></span>Live</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
            <path d="M16 16h5v5"/>
          </svg>
        </button>
        <button class="icon-btn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Usage card -->
    <div class="card">
      <div class="usage-section">
        <div class="usage-row">
          <div class="usage-header">
            <div class="usage-label-group">
              <span class="usage-label">5h window</span>
              <span class="usage-reset">1h 42m left</span>
            </div>
            <span class="usage-pct">68%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill safe" style="width: 68%"></div>
          </div>
        </div>

        <div class="usage-row">
          <div class="usage-header">
            <div class="usage-label-group">
              <span class="usage-label">7d window</span>
              <span class="usage-reset">3d 14h left</span>
            </div>
            <span class="usage-pct warn">81%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill warn" style="width: 81%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Models row — simplified -->
    <div class="card models-row">
      <div class="model-item">
        <span class="model-dot opus"></span>
        <span class="model-name">Opus</span>
        <span class="model-pct">42%</span>
      </div>
      <div class="model-item">
        <span class="model-dot sonnet"></span>
        <span class="model-name">Sonnet</span>
        <span class="model-pct">31%</span>
      </div>
      <div class="model-item">
        <span class="model-dot haiku"></span>
        <span class="model-name">Haiku</span>
        <span class="model-pct">8%</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-time">Updated 2m ago</span>
      <button class="footer-btn">See details</button>
    </div>
  </div>
</body>
</html>
